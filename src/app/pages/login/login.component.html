<div class="login">
  <div class="login__card">
    <img [src]="tenant.logoUrl" [alt]="tenant.name" class="login__logo" />
    <h1 class="login__title">{{ tenant.name }}</h1>
    <p class="login__subtitle">Reserva tu mesa en unos segundos</p>

    <form (ngSubmit)="submit()" class="login__form">
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          class="form-control"
          name="email"
          [(ngModel)]="email"
          placeholder="tu@email.com"
          autocomplete="username"
        />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          class="form-control"
          name="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      <p class="login__error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
        <span *ngIf="!loading">Entrar</span>
        <span *ngIf="loading" class="spinner-sm"></span>
      </button>
    </form>

    <a routerLink="/forgot-password" class="login__forgot">¿Olvidaste tu contraseña?</a>
  </div>
</div>
